baseURL: "https://williambjorndahl.com/"
languageCode: "en-us"
title: "William Bjorndahl"
theme: ["PaperMod"]
enableRobotsTXT: true

# Hugo recommends this cache config for GitHub Pages builds
caches:
  images:
    dir: :cacheDir/images
# (From Hugo’s GitHub Pages hosting guide.) :contentReference[oaicite:1]{index=1}

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  profileMode:
    enabled: true
    title: "William Bjorndahl"
    subtitle: |
      Ph.D. Candidate at Southern Methodist University<br>
      My main research interests explore efficient 3D spatial representations for radio frequencies.<br>
      This has led much of my work to lie at the intersection of radiance fields and wireless systems.
    #imageUrl: "/images/avatar.jpeg"
    imageWidth: 220
    buttons:
      - name: Publications
        url: "/publications/"
      - name: Notes
        url: "/posts/"

  socialIcons:
    - name: email
      url: "mailto:wbjorndahl@smu.edu"
    - name: github
      url: "https://github.com/wbjorndahl"
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=bzGa4XAAAAAJ"
    # - name: orcid
    #   url: "https://orcid.org/0009-0002-0420-3334"

  # Add items with date (YYYY-MM-DD) and text to show under "Recent News".
  recentNews:
    - date: 2025-12-20     # use YYYY-MM-DD so Hugo can format it
      text: "'SPARK: Sparse Parametric Antenna Representation using Kernels' was accepted to IEEE INFOCOM 2026. [[arxiv](https://arxiv.org/abs/2601.05440)]"
      url: "https://arxiv.org/abs/2601.05440"

menu:
  main:
    - name: Publications
      url: /publications/
      weight: 10
    - name: Notes
      url: /posts/
      weight: 20
