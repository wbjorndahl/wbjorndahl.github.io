baseURL: "https://williambjorndahl.com/"
languageCode: "en-us"
title: "William Bjorndahl"
theme: ["PaperMod"]
enableRobotsTXT: true

# Hugo recommends this cache config for GitHub Pages builds
caches:
  images:
    dir: :cacheDir/images
# (From Hugo’s GitHub Pages hosting guide.) :contentReference[oaicite:1]{index=1}

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  profileMode:
    enabled: true
    title: "William Bjorndahl"
    subtitle: |
      Ph.D. Candidate at Southern Methodist University in the Autonomous Drone Teaming Lab, advised by [Dr. Joseph Camp](https://s2.smu.edu/~camp/).\
      \
      My research is in efficient spatial representations for perception-driven actions in wireless systems.
      \
      \
      Note: I am defending my dissertation in Spring 2026.
    description: |
      During my Ph.D. I have developed 3D models driven by wireless signals, capturing how those signals behave throughout space. These signal-centric representations let mobile devices like phones or drones natively perceive their surroundings and act intelligently, without relying on explicit, prior environmental models. This supports context-aware decision making in unfamiliar or rapidly changing environments because the models adapt directly using RF measurements as these devices move through the world.
    imageUrl: "/images/avatar.jpg"
    imageWidth: 180
    buttons:
      - name: Publications
        url: "/publications/"
      - name: Notes
        url: "/posts/"

  socialIcons:
    - name: email
      url: "mailto:wbjorndahl@smu.edu"
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=bzGa4XAAAAAJ"
    # - name: orcid
    #   url: "https://orcid.org/0009-0002-0420-3334"

  # Add items with date (YYYY-MM-DD) and text to show under "News".
  recentNews:
    - date: 2025-12-20
      text: "'SPARK: Sparse Parametric Antenna Representation using Kernels' accepted to IEEE INFOCOM 2026."

menu:
  main:
    - name: Publications
      url: /publications/
      weight: 10
    - name: Notes
      url: /posts/
      weight: 20
