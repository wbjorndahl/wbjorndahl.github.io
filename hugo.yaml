baseURL: "https://williambjorndahl.com/"
languageCode: "en-us"
title: "William Bjorndahl"
theme: ["PaperMod"]
enableRobotsTXT: true

# Hugo recommends this cache config for GitHub Pages builds
caches:
  images:
    dir: :cacheDir/images
# (From Hugo’s GitHub Pages hosting guide.) :contentReference[oaicite:1]{index=1}

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  profileMode:
    enabled: true
    title: "William Bjorndahl"
    subtitle: |
      Ph.D. Candidate at Southern Methodist University\
      \
      My research is in efficient spatial representations for perception-driven actions in wireless systems.
    #imageUrl: "/images/avatar.jpeg"
    imageWidth: 220
    buttons:
      - name: Publications
        url: "/publications/"
      - name: Notes
        url: "/posts/"

  socialIcons:
    - name: email
      url: "mailto:wbjorndahl@smu.edu"
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=bzGa4XAAAAAJ"
    # - name: orcid
    #   url: "https://orcid.org/0009-0002-0420-3334"

  # Add items with date (YYYY-MM-DD) and text to show under "News".
  recentNews:
    - date: 2025-02-28
      text: "'BeamMix: 3D Gaussian Mixture-of-Experts for Element-Space Wireless Channel Modeling' accepted to ACM MobiSys 2026."
    - date: 2025-02-28
      text: "'PropSplat: Map-Free RF Field Reconstruction via 3D Gaussian Propagation Splatting' accepted to IEEE DySPAN 2026."
    - date: 2025-12-20
      text: "'SPARK: Sparse Parametric Antenna Representation using Kernels' accepted to IEEE INFOCOM 2026."

menu:
  main:
    - name: Publications
      url: /publications/
      weight: 10
    - name: Notes
      url: /posts/
      weight: 20
